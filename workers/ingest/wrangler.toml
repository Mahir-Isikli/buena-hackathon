name = "buena-ingest"
main = "src/email.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
account_id = "564b8125cf83c4aa38cf87f61f2ac14c"

# HTTP trigger for bulk-import POSTs and health checks
workers_dev = true

[[r2_buckets]]
binding = "RAW"
bucket_name = "buena-raw"

[[r2_buckets]]
binding = "VAULTS"
bucket_name = "buena-vaults"

[[d1_databases]]
binding = "ERP"
database_name = "buena-erp"
database_id = "38e9caca-5f78-4a5c-8731-d6e00039c7fa"

[[queues.producers]]
binding = "EXTRACT_QUEUE"
queue = "buena-extract"

[[queues.consumers]]
queue = "buena-extract"
# Each Gemini high-thinking call is 5-15s. With max_batch_size > 1 we hit
# the worker CPU/wall-time limit and the whole batch cancels + retries,
# making the queue drain in a death spiral. One message per invocation
# keeps each call comfortably under the limit.
max_batch_size = 1
max_batch_timeout = 5
# Serialize property.md writes across invocations.
max_concurrency = 1
