<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buena Sidebar - Brand Aligned V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Importing fonts to mimic Buena's typography */
        @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            /* Buena's pure dark background */
            background-color: #010105; 
            color: #fafaf9;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            letter-spacing: -0.42px; /* Buena's tight tracking */
        }

        h1, h2, h3, .brand-font {
            font-family: 'Inter Tight', sans-serif;
            letter-spacing: -0.8px;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; }
        
        .has-tooltip:hover .tooltip { display: block; z-index: 50; }

        /* Buena's dark theme colors mapped to CSS variables */
        :root {
            --bg-base: #010105;
            --bg-surface: #171717; /* background-secondary */
            --bg-elevated: #292524;
            --border-dim: #44403c;
            --text-main: #fafaf9;
            --text-muted: #a8a29e;
            --accent-green: #398957;
            --btn-primary-bg: #e5e5e5;
            --btn-primary-text: #000;
        }
    </style>
    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            document.querySelectorAll('.nav-tab').forEach(el => {
                el.classList.remove('text-[#fafaf9]', 'border-[#fafaf9]');
                el.classList.add('text-[#a8a29e]', 'border-transparent');
            });
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.classList.remove('text-[#a8a29e]', 'border-transparent');
            activeBtn.classList.add('text-[#fafaf9]', 'border-[#fafaf9]');
        }
        
        function toggleRejectReason(id) {
            const el = document.getElementById('reason-' + id);
            el.classList.toggle('hidden');
        }
    </script>
</head>
<body>

<!-- Sidebar Container matching Buena's premium dark mode -->
<div class="w-[420px] h-[90vh] max-h-[900px] bg-[#010105] flex flex-col overflow-hidden border border-[#44403c] rounded-2xl shadow-2xl">
    
    <!-- 1. Header -->
    <header class="px-5 py-4 flex items-center justify-between border-b border-[#292524] z-20">
        <div class="flex items-baseline gap-2 min-w-0">
            <span class="font-bold text-[18px] tracking-tight text-[#fafaf9] brand-font">Buena</span>
            <span class="text-[#44403c] font-bold">/</span>
            <span class="text-[12px] font-medium text-[#a8a29e] tracking-wide truncate uppercase">Immanuelkirchstrasse</span>
        </div>
        <button class="text-[#a8a29e] hover:text-[#fafaf9] transition-colors p-1.5 rounded hover:bg-[#171717]">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>
        </button>
    </header>

    <!-- 2. Main Navigation Tabs -->
    <div class="px-5 pt-2 z-20 relative border-b border-[#292524]">
        <div class="flex gap-6">
            <button id="btn-tab-queue" onclick="switchTab('tab-queue')" class="nav-tab pb-3 text-[14px] font-medium text-[#fafaf9] border-b-2 border-[#fafaf9] transition-colors relative flex items-center gap-2">
                Queue
                <span class="bg-[#171717] border border-[#44403c] text-[#fafaf9] py-[2px] px-2.5 rounded-full text-[10px] font-bold">8</span>
            </button>
            <button id="btn-tab-history" onclick="switchTab('tab-history')" class="nav-tab pb-3 text-[14px] font-medium text-[#a8a29e] hover:text-[#fafaf9] border-b-2 border-transparent transition-colors relative flex items-center gap-2">
                Change history
            </button>
        </div>
    </div>

    <!-- ========================================================= -->
    <!-- TAB 1: PENDING QUEUE                                      -->
    <!-- ========================================================= -->
    <div id="tab-queue" class="tab-content active flex-1 overflow-hidden bg-[#010105]">
        
        <!-- Filters (Brand-aligned dark pills) -->
        <div class="px-5 py-4 flex gap-2 overflow-x-auto hide-scrollbar shrink-0 border-b border-[#171717]">
            <button class="px-3.5 py-1.5 text-[12px] font-medium bg-[#171717] text-[#fafaf9] border border-[#44403c] rounded-full flex items-center gap-1.5 transition-colors hover:bg-[#292524]">
                All <span class="text-[#a8a29e]">8</span>
            </button>
            <button class="px-3.5 py-1.5 text-[12px] font-medium bg-transparent text-[#a8a29e] border border-transparent hover:bg-[#171717] hover:text-[#fafaf9] rounded-full flex items-center gap-1.5 transition-colors">
                EH-007 <span class="text-[#78716c]">1</span>
            </button>
            <button class="px-3.5 py-1.5 text-[12px] font-medium bg-transparent text-[#a8a29e] border border-transparent hover:bg-[#171717] hover:text-[#fafaf9] rounded-full flex items-center gap-1.5 transition-colors">
                EH-014 <span class="text-[#78716c]">2</span>
            </button>
        </div>

        <!-- Queue Cards List -->
        <div class="flex-1 overflow-y-auto hide-scrollbar p-5 space-y-4">
            
            <!-- Card 1 (Dark mode, high contrast typography) -->
            <div class="bg-[#171717] rounded-xl border border-[#292524] p-5 hover:border-[#44403c] transition-colors">
                
                <!-- TOP ROW -->
                <div class="flex justify-between items-center mb-3">
                    <div class="text-[12px] font-medium tracking-wide text-[#a8a29e] uppercase brand-font">Open issues</div>
                    <div class="flex items-center gap-2">
                        <span class="text-[#398957] bg-[#398957]/10 font-mono text-[10px] font-bold px-1.5 py-0.5 rounded tracking-widest">99%</span>
                        <div class="bg-[#292524] text-[#fafaf9] font-mono text-[11px] font-medium px-2 py-0.5 rounded shadow-sm border border-[#44403c]">EH-014</div>
                    </div>
                </div>
                
                <!-- CONTENT ROW -->
                <p class="text-[15px] text-[#fafaf9] font-medium leading-[1.6] mb-5 tracking-tight">
                    Die Miete wird seit dem 15.01.2026 wegen eines Heißwasser-Defekts um 10 Prozent gemindert
                </p>
                
                <!-- BOTTOM ROW (Buena's exact button colors) -->
                <div class="flex justify-between items-center pt-4 border-t border-[#292524]">
                    <div class="flex gap-2">
                        <button class="bg-[#e5e5e5] text-[#000] text-[13px] font-semibold px-4 py-2 rounded-full hover:bg-[#d4d4d4] transition-colors">
                            Approve
                        </button>
                        <button onclick="toggleRejectReason('1')" class="bg-transparent text-[#fafaf9] border border-[#44403c] text-[13px] font-semibold px-4 py-2 rounded-full hover:bg-[#292524] transition-colors">
                            Reject
                        </button>
                    </div>
                    
                    <div class="relative has-tooltip">
                        <button class="text-[#a8a29e] hover:text-[#fafaf9] text-[12px] font-medium flex items-center gap-1.5 transition-colors p-1">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            Source
                        </button>
                        <!-- Mocked Popover -->
                        <div class="tooltip hidden absolute bottom-full right-0 mb-2 w-64 p-4 bg-[#292524] text-[#fafaf9] text-[12px] rounded-xl shadow-2xl border border-[#44403c] z-50">
                            <div class="font-mono text-[#a8a29e] mb-2 break-all text-[11px] leading-relaxed">CAJ9sWTsUv0Th4b6m8QzUhDB...</div>
                            <div class="text-[#fafaf9] flex items-center gap-1.5 font-medium">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#398957" stroke-width="2.5"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"></path></svg>
                                gemini-3-pro
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Hidden Reject Reason -->
                <div id="reason-1" class="hidden mt-4 p-4 bg-[#292524] border border-[#44403c] rounded-xl">
                    <label class="text-[11px] font-medium text-[#a8a29e] uppercase tracking-wide block mb-2">Rejection Reason</label>
                    <textarea class="w-full text-[13px] p-3 bg-[#010105] text-[#fafaf9] border border-[#44403c] rounded-lg focus:outline-none focus:border-[#a8a29e] mb-3 transition-colors resize-none placeholder-[#78716c]" rows="2" placeholder="Logged for accountability..."></textarea>
                    <div class="flex justify-end gap-3 items-center">
                        <button onclick="toggleRejectReason('1')" class="text-[12px] font-medium text-[#a8a29e] hover:text-[#fafaf9] transition-colors">Cancel</button>
                        <button class="bg-[#e03131] text-[#fff] text-[12px] font-semibold px-3.5 py-1.5 rounded-full hover:bg-[#c92a2a] transition-colors">Confirm</button>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="bg-[#171717] rounded-xl border border-[#292524] p-5 hover:border-[#44403c] transition-colors">
                <div class="flex justify-between items-center mb-3">
                    <div class="text-[12px] font-medium tracking-wide text-[#a8a29e] uppercase brand-font">Service providers</div>
                    <div class="flex items-center gap-2">
                        <span class="text-[#398957] bg-[#398957]/10 font-mono text-[10px] font-bold px-1.5 py-0.5 rounded tracking-widest">98%</span>
                    </div>
                </div>
                
                <p class="text-[15px] text-[#fafaf9] font-medium leading-[1.6] mb-5 tracking-tight">
                    DL-002 führt die Aufzugswartung für 185 EUR/Monat durch
                </p>
                
                <div class="flex justify-between items-center pt-4 border-t border-[#292524]">
                    <div class="flex gap-2">
                        <button class="bg-[#e5e5e5] text-[#000] text-[13px] font-semibold px-4 py-2 rounded-full hover:bg-[#d4d4d4] transition-colors">Approve</button>
                        <button class="bg-transparent text-[#fafaf9] border border-[#44403c] text-[13px] font-semibold px-4 py-2 rounded-full hover:bg-[#292524] transition-colors">Reject</button>
                    </div>
                    <div class="relative has-tooltip">
                        <button class="text-[#a8a29e] hover:text-[#fafaf9] text-[12px] font-medium flex items-center gap-1.5 transition-colors p-1">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            Source
                        </button>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <div id="tab-history" class="tab-content flex-1 overflow-hidden bg-[#010105]"></div>

    <!-- ========================================================= -->
    <!-- STATUS BAR (Bottom)                                       -->
    <!-- ========================================================= -->
    <div class="border-t border-[#292524] bg-[#010105] px-5 py-4 flex justify-between items-center shrink-0 z-20">
        <div class="flex items-center gap-2.5">
            <span class="w-2 h-2 rounded-full bg-[#398957] shadow-[0_0_8px_rgba(57,137,87,0.8)]"></span>
            <span class="text-[11px] font-semibold text-[#a8a29e] uppercase tracking-[0.15em] brand-font">Live</span>
        </div>
        <div class="flex items-center gap-3 text-[#a8a29e] text-[11px] font-mono tracking-wide">
            <span class="flex items-center gap-1.5"><span class="text-[#f59f00]">🔥 1d</span></span>
            <span class="px-2">8 QUEUE</span>
            <span class="px-2 border-l border-[#44403c] text-[#78716c]">5 TODAY <span class="text-[#398957] ml-0.5">▲5</span></span>
        </div>
    </div>
</div>

</body>
</html>
